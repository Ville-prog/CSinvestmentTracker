spring.config.import=optional:file:./application-local.properties

server.port=8080
spring.application.name=cstracker-backend

# PostgreSQL: uses Railway variables in production, falls back to locals in dev
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:cstracker}?TimeZone=UTC
spring.datasource.username=${PGUSER:cstracker}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Steam community inventory endpoint
steam.inventory.url=https://steamcommunity.com/inventory/%s/730/2?l=english&count=1000

# Steam user for nightly price collection
steam.user.id=${STEAM_USER_ID:76561198178056718}

# Secret key for protected admin endpoints
admin.secret=${ADMIN_SECRET}
